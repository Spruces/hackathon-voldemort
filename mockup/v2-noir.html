<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIP RESTAURANTS — C: 누아르 미니멀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./fonts/pretendard.css" />
<style>
  :root {
    --bg: #060504;
    --bg-card: #0a0807;
    --line: rgba(196, 167, 113, 0.1);
    --line-strong: rgba(196, 167, 113, 0.45);
    --gold: #c4a771;
    --gold-bright: #e0c186;
    --red: #8b1924;
    --text: #e8dfca;
    --text-soft: #a89e88;
    --muted: #5a5247;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Pretendard', -apple-system, sans-serif; font-weight: 300; }
  body { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 60px; }

  .header {
    background: #000;
    padding: 22px 24px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
    border-bottom: 1px solid var(--gold);
  }
  .header .brand {
    font-family: 'Italiana', 'Pretendard', serif;
    font-size: 22px;
    letter-spacing: 0.45em;
    color: var(--gold);
    font-weight: 400;
  }
  .header .badge {
    font-family: 'Italiana', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--text-soft);
    font-weight: 400;
  }

  .hero-title {
    padding: 60px 24px 40px;
    text-align: center;
  }
  .hero-title h1 {
    font-family: 'Italiana', serif;
    font-size: 44px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.08em;
    line-height: 1.1;
  }
  .hero-title .sub {
    color: var(--text-soft);
    font-size: 9px;
    letter-spacing: 0.6em;
    margin-top: 22px;
    font-family: 'Italiana', serif;
  }
  .hero-title .ornament {
    color: var(--gold);
    margin-top: 18px;
    letter-spacing: 1em;
    font-size: 12px;
    opacity: 0.6;
  }

  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding: 16px 22px 18px;
    scrollbar-width: none;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--text-soft);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
    letter-spacing: 0.24em;
    font-weight: 300;
    font-family: 'Italiana', 'Pretendard', sans-serif;
  }
  .tab:hover { color: var(--gold); }
  .tab.active {
    color: var(--gold);
    font-weight: 400;
  }
  .tab.active::after {
    content: "";
    display: block;
    width: 4px; height: 4px;
    background: var(--gold);
    border-radius: 50%;
    margin: 6px auto 0;
  }
  .tab .count {
    opacity: 0.5;
    margin-left: 4px;
    font-size: 9px;
  }

  .search-bar {
    padding: 24px 24px 4px;
    position: relative;
  }
  .search-bar::before {
    content: "⌕";
    position: absolute;
    left: 24px; top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 16px;
  }
  .search-bar input {
    width: 100%;
    background: transparent;
    color: var(--text);
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 14px 0 14px 26px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    letter-spacing: 0.06em;
  }
  .search-bar input:focus { outline: none; border-bottom-color: var(--gold); }
  .search-bar input::placeholder { color: var(--muted); font-style: italic; }

  .list { padding: 16px 0; }
  .card {
    padding: 28px 26px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    cursor: pointer;
    position: relative;
    transition: all 0.3s;
  }
  .card + .card::before {
    content: "";
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 24px; height: 1px;
    background: var(--line-strong);
  }
  .card:hover .card-inner { transform: translateY(-2px); }
  .card-inner { transition: all 0.3s; }
  .card .top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 14px;
  }
  .card .name {
    font-family: 'Pretendard', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0;
  }
  .card .name-eng {
    font-family: 'Italiana', serif;
    font-size: 15px;
    color: var(--gold);
    font-weight: 400;
    letter-spacing: 0.06em;
    opacity: 0.85;
  }
  .card .meta {
    display: flex;
    gap: 12px;
    font-size: 10px;
    color: var(--text-soft);
    letter-spacing: 0.32em;
    font-weight: 300;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .card .meta .cat { color: var(--gold); font-weight: 400; }
  .card .meta .sep { color: var(--muted); }

  .badge-michelin {
    display: inline-block;
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    font-size: 9px;
    padding: 3px 9px;
    letter-spacing: 0.32em;
    font-weight: 400;
    vertical-align: middle;
    margin-left: 10px;
    font-family: 'Italiana', serif;
  }
  .badge-vip {
    display: inline-block;
    background: transparent;
    color: var(--gold);
    border: none;
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    font-size: 9px;
    padding: 2px 9px;
    letter-spacing: 0.4em;
    font-weight: 400;
    vertical-align: middle;
    margin-left: 10px;
    font-family: 'Italiana', serif;
  }

  .mode-switch {
    position: fixed;
    bottom: 22px;
    right: calc(50vw - 240px + 22px);
    background: rgba(0,0,0,0.85);
    border: 1px solid var(--gold);
    padding: 12px 22px;
    color: var(--gold);
    font-size: 10px;
    cursor: pointer;
    z-index: 50;
    letter-spacing: 0.32em;
    backdrop-filter: blur(8px);
    font-family: 'Italiana', serif;
  }
  @media (max-width: 480px) {
    .mode-switch { right: 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="brand">V · I · P</div>
  <div class="badge">MMXXVI</div>
</div>

<div class="hero-title">
  <h1>Recommended<br/>Restaurants</h1>
  <div class="ornament">— · · · —</div>
  <div class="sub">SEOUL · 228 PLACES</div>
</div>

<div class="tabs">
  <div class="tab active">전체<span class="count">228</span></div>
  <div class="tab">한식<span class="count">68</span></div>
  <div class="tab">일식<span class="count">43</span></div>
  <div class="tab">이탈리안<span class="count">33</span></div>
  <div class="tab">중식<span class="count">30</span></div>
  <div class="tab">프렌치<span class="count">29</span></div>
  <div class="tab">아메리칸<span class="count">20</span></div>
</div>

<div class="search-bar">
  <input type="text" placeholder="Find a restaurant" />
</div>

<div class="list">
  <div class="card"><div class="card-inner">
    <div class="top">
      <div class="name">라연<span class="badge-michelin">MICHELIN</span></div>
      <div class="name-eng">Layeon</div>
    </div>
    <div class="meta">
      <span class="cat">한식</span><span class="sep">·</span>
      <span>장충동</span><span class="sep">·</span>
      <span>신라호텔</span>
    </div>
  </div></div>
  <div class="card"><div class="card-inner">
    <div class="top">
      <div class="name">몽고네<span class="badge-vip">VIP</span></div>
      <div class="name-eng">Mongone</div>
    </div>
    <div class="meta">
      <span class="cat">이탈리안</span><span class="sep">·</span>
      <span>신사동</span>
    </div>
  </div></div>
  <div class="card"><div class="card-inner">
    <div class="top">
      <div class="name">더 라운드</div>
      <div class="name-eng">The Round</div>
    </div>
    <div class="meta">
      <span class="cat">중식</span><span class="sep">·</span>
      <span>청담동</span>
    </div>
  </div></div>
  <div class="card"><div class="card-inner">
    <div class="top">
      <div class="name">RELA</div>
      <div class="name-eng">Rela</div>
    </div>
    <div class="meta">
      <span class="cat">프렌치</span><span class="sep">·</span>
      <span>상일동</span>
    </div>
  </div></div>
  <div class="card"><div class="card-inner">
    <div class="top">
      <div class="name">푸에고</div>
      <div class="name-eng">Fuego</div>
    </div>
    <div class="meta">
      <span class="cat">아메리칸</span><span class="sep">·</span>
      <span>한남동</span>
    </div>
  </div></div>
  <div class="card"><div class="card-inner">
    <div class="top">
      <div class="name">휴135</div>
      <div class="name-eng">Hue135</div>
    </div>
    <div class="meta">
      <span class="cat">한식</span><span class="sep">·</span>
      <span>한남동</span>
    </div>
  </div></div>
</div>

<button class="mode-switch">VIEWER</button>

</body>
</html>
