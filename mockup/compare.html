<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIP RESTAURANTS — 시안 비교</title>
<link rel="stylesheet" href="./fonts/pretendard.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    color: #ddd;
    font-family: 'Pretendard', -apple-system, sans-serif;
    padding: 24px;
    min-height: 100vh;
    font-weight: 400;
  }
  h1 {
    text-align: center;
    margin-bottom: 8px;
    color: #d4af6e;
    font-weight: 400;
    letter-spacing: 0.2em;
  }
  .sub {
    text-align: center;
    color: #888;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    max-width: 2400px;
    margin: 0 auto;
  }
  @media (max-width: 1700px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px)  { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .panel:hover { border-color: #d4af6e; }
  .panel.featured {
    border-color: #d4af6e;
    box-shadow: 0 4px 24px rgba(212,175,110,0.12);
  }
  .panel-header {
    padding: 14px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .panel-name {
    font-weight: 500;
    color: #d4af6e;
    letter-spacing: 0.05em;
    font-size: 14px;
  }
  .panel-tag {
    font-size: 10px;
    color: #888;
    letter-spacing: 0.1em;
    text-align: right;
  }
  .panel iframe {
    width: 100%;
    height: 800px;
    border: none;
    background: #000;
    display: block;
  }
  .open-btn {
    display: block;
    text-align: center;
    padding: 10px;
    background: #1a1a1a;
    color: #d4af6e;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.15em;
    border-top: 1px solid #2a2a2a;
    transition: background 0.2s;
  }
  .open-btn:hover { background: #2a2a2a; }

  .legend {
    text-align: center;
    margin: 24px auto;
    max-width: 1200px;
    padding: 16px;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.8;
    color: #aaa;
  }
  .legend strong { color: #d4af6e; }
  .legend .new {
    background: #c9a96e;
    color: #000;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 0.1em;
    margin-right: 4px;
  }
</style>
</head>
<body>

<h1>VIP RESTAURANTS · 시안 비교</h1>
<div class="sub">Pretendard 폰트 적용 + 프라이빗 클럽 톤 신규 (v3) · 모바일 폭(480px) 시뮬</div>

<div class="legend">
  <strong>기존</strong> 캐주얼 럭셔리 ·
  <strong>A 잉크</strong> 묵직·미슐랭 톤 ·
  <strong>B 오닉스</strong> 따뜻한 골드·호텔 ·
  <strong>C 누아르</strong> 미니멀·매거진 ·
  <span class="new">NEW</span><strong>D 클럽</strong> 프라이빗 큐레이터·비밀 멤버십
</div>

<div class="grid">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-name">기존</div>
      <div class="panel-tag">v1 · 캐주얼</div>
    </div>
    <iframe src="index.html"></iframe>
    <a href="index.html" target="_blank" class="open-btn">↗ 크게 보기</a>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-name">A · 잉크 블랙</div>
      <div class="panel-tag">묵직 · 절제</div>
    </div>
    <iframe src="v2-ink.html"></iframe>
    <a href="v2-ink.html" target="_blank" class="open-btn">↗ 크게 보기</a>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-name">B · 오닉스</div>
      <div class="panel-tag">따뜻한 골드</div>
    </div>
    <iframe src="v2-onyx.html"></iframe>
    <a href="v2-onyx.html" target="_blank" class="open-btn">↗ 크게 보기</a>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-name">C · 누아르</div>
      <div class="panel-tag">미니멀</div>
    </div>
    <iframe src="v2-noir.html"></iframe>
    <a href="v2-noir.html" target="_blank" class="open-btn">↗ 크게 보기</a>
  </div>

  <div class="panel featured">
    <div class="panel-header">
      <div class="panel-name">D · 클럽 ⭐</div>
      <div class="panel-tag">프라이빗 큐레이터</div>
    </div>
    <iframe src="v3-club.html"></iframe>
    <a href="v3-club.html" target="_blank" class="open-btn">↗ 크게 보기</a>
  </div>
</div>

</body>
</html>
